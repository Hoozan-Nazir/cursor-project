<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1, width=device-width">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<link href="/static/x.ico" rel="icon">

<link href="/static/styles.css" rel="stylesheet">

<!-- Bootstrap Icons (NEW) -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<title>X {% block title %}{% endblock %}</title>

</head>

<body style="background:#f4f6f8;">

<nav class="navbar navbar-expand-md navbar-dark bg-dark shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold" href="/">

<span class="text-warning">mini</span>

<span class="text-white">X</span>

</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#navbar">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbar">

{% if session["user_id"] %}

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link" href="/">

<i class="bi bi-house"></i>

Home

</a>

</li>

<li class="nav-item">

<a class="nav-link" href="/post">

<i class="bi bi-pencil-square"></i>

Post

</a>

</li>

<li class="nav-item">

<a class="nav-link" href="/users">

<i class="bi bi-people"></i>

Users

</a>

</li>

<li class="nav-item">

<a class="nav-link"
href="/profile/{{ session['user_id'] }}">

<i class="bi bi-person"></i>

Profile

</a>

</li>

<li class="nav-item">

<a class="nav-link" href="/explore">

<i class="bi bi-compass"></i>

Explore

</a>

</li>

</ul>

<ul class="navbar-nav ms-auto">

<li class="nav-item">

<a class="btn btn-danger btn-sm"
href="/logout">

Log Out

</a>

</li>

</ul>

{% else %}

<ul class="navbar-nav ms-auto">

<li class="nav-item">

<a class="nav-link"
href="/register">

Register

</a>

</li>

<li class="nav-item">

<a class="nav-link"
href="/login">

Log In

</a>

</li>

</ul>

{% endif %}

</div>

</div>

</nav>

{% if get_flashed_messages() %}

<header>

<div class="alert alert-info text-center mb-0">

{{ get_flashed_messages() | join(" ") }}

</div>

</header>

{% endif %}

<!-- removed text-center (IMPORTANT) -->
<main class="container py-4" style="max-width:750px;">

{% block main %}{% endblock %}

</main>

<footer class="text-center text-muted mt-5 mb-3">

<small>

Mini X AI • CS50 Project

</small>

</footer>

</body>

</html>
